services:
  loopforge-browser-sandbox:
    build:
      context: ../..
      dockerfile: docker/sandbox-browser/Dockerfile
    ports:
      - "127.0.0.1:9222:9222"
      - "127.0.0.1:6080:6080"
    environment:
      LOOPFORGE_SANDBOX_BROWSER_HEADLESS: "0"
      LOOPFORGE_SANDBOX_BROWSER_NO_SANDBOX: "1"
      LOOPFORGE_SANDBOX_BROWSER_NOVNC_PASSWORD: "loopforge"
    shm_size: "1gb"
